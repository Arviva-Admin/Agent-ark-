version: '3.9'
services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - SUPERAGI_BASE_URL=http://superagi:8001
      - AGENT_S_REPO_PATH=/app/third_party/Agent-S
    volumes:
      - .:/app
    depends_on:
      - superagi

  superagi:
    image: python:3.11-slim
    working_dir: /workspace
    command: sh -c "echo 'Attach real SuperAGI service here on :8001' && sleep infinity"
    ports:
      - "8001:8001"

  frontend:
    image: node:20-alpine
    working_dir: /app/arviva_agent/frontend/nextjs_app
    command: sh -c "npm install && npm run dev"
    volumes:
      - .:/app
    ports:
      - "3000:3000"
    depends_on:
      - api
